services:
  # ─────────────────────────────────────────
  # ─────────────────────────────────────────
  # Banco de dados em memória – Redis (Cache)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: obi-uefs-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - obi-network

  # ─────────────────────────────────────────
  # Backend – Node.js / Express / TypeScript
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: obi-uefs-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      # Código-fonte (hot-reload)
      - ./backend:/app
      # Volume nomeado para node_modules — evita sobrescrever com o host
      - backend_node_modules:/app/node_modules
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - obi-network

  # ─────────────────────────────────────────
  # Frontend – React / Vite / TypeScript
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: obi-uefs-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      # Código-fonte (hot-reload)
      - ./frontend:/app
      # Volume nomeado para node_modules — evita sobrescrever com o host
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
      - redis
    networks:
      - obi-network

# ─────────────────────────────────────────
# Volumes nomeados
# ─────────────────────────────────────────
volumes:
  redis_data:
    name: obi-uefs-redis-data
  backend_node_modules:
    name: obi-uefs-backend-node-modules
  frontend_node_modules:
    name: obi-uefs-frontend-node-modules

# ─────────────────────────────────────────
# Rede isolada
# ─────────────────────────────────────────
networks:
  obi-network:
    name: obi-uefs-network
    driver: bridge
