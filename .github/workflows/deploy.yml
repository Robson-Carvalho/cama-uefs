name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Frontend .env.local
        run: |
          echo "VITE_API_URL=https://api.cama-uefs.safeentrysistemas.com.br" > frontend/.env.local

      - name: Create Backend .env
        run: |
          echo "BACKEND_PORT=3001" > backend/.env
          echo "FRONTEND_URL=https://cama-uefs.safeentrysistemas.com.br" >> backend/.env
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> backend/.env
          echo "DIRECT_URL=${{ secrets.DIRECT_URL }}" >> backend/.env
          echo "REDIS_PORT=6379" >> backend/.env
          echo "REDIS_HOST=redis" >> backend/.env
          echo "REDIS_URL=redis://redis:6379" >> backend/.env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> backend/.env
          echo "SALT_ROUNDS=10" >> backend/.env
          echo "DEFAULT_ADMIN_EMAIL=${{ secrets.DEFAULT_ADMIN_EMAIL }}" >> backend/.env
          echo "DEFAULT_ADMIN_PASSWORD=${{ secrets.DEFAULT_ADMIN_PASSWORD }}" >> backend/.env
          echo "RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}" >> backend/.env
          echo "MAIL_FROM=${{ secrets.MAIL_FROM }}" >> backend/.env

      - name: Create deployment archive
        run: |
          mkdir -p .archive
          tar -czf .archive/deploy.tar.gz --exclude='.git' --exclude='node_modules' --exclude='.archive' .

      - name: Copy archive to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: ".archive/deploy.tar.gz"
          target: "/home/UEFS"
          strip_components: 1

      - name: Extract and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/UEFS
            
            # Extrair os arquivos e deletar o arquivo compactado
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
            
            # Subir o ambiente reconstruindo a imagem (útil para o frontend pegar o novo código)
            docker compose up --build -d
            
            # Observação: O comando de Prisma Migrate foi removido daqui pois a VPS estava sendo
            # bloqueada ao tentar conectar na porta 5432 (possível bloqueio de IP no Supabase).
            # Como o Supabase fica na nuvem, você pode rodar 'npx prisma migrate dev' direto
            # do seu computador local sempre que alterar o schema.prisma!
